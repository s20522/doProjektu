version: '3.8'

services:
  # Neo4j - Graph Database
  neo4j:
    image: neo4j:5.15-community
    container_name: tmdb-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
      - ./init:/var/lib/neo4j/import
    networks:
      - tmdb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB - Vector Database
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: tmdb-chromadb
    ports:
      - "8000:8000"
    environment:
      CHROMA_DB_IMPL: duckdb
      PERSIST_DIRECTORY: /chroma/data
      ANONYMIZED_TELEMETRY: "False"
    volumes:
      - chromadb_data:/chroma/data
    networks:
      - tmdb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama - Local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: tmdb-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - tmdb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  chromadb_data:
    driver: local
  ollama_data:
    driver: local

networks:
  tmdb-network:
    driver: bridge
